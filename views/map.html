<!DOCTYPE html>
<htaml lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="origin">
    <link rel="stylesheet" href="/css/map.css">
    <title>카카오 지도</title>
</head>
<body style="margin:0; padding:0;">

    <div class="main-container">
        <div id="map-container" class="full-screen" style="height: 100vh;">
           
            <div id="map" style="width:100%; height:100%;"></div>
            
            
            <div class="top-nav">
                <div class="logo">CODIMAP</div>
                <div class="search-box">
                    <input type="text" placeholder="지역을 검색하시오">
                    <button>🔍</button>
                </div>

                <div id="season-filter-container" class="season-container"></div>
            </div>

            <div id="current-filter-info" class="filter-status">
                현재 <span id="display-region">전국</span>의 
                <span id="display-season">봄</span> 코디를 보고 있습니다.
            </div>
        </div>

        <div id="side-panel" class="hidden">
            <div class="panel-header">
                <h3>CODI!</h3>
                <button id="close-btn" onclick="closePanel()"></button>
            </div>
            <div class="post-grid">
                <div class="post-item"></div>
                <div class="post-item"></div>
                <div class="post-item"></div>
                <div class="post-item"></div>
                <div class="post-item"></div>
                <div class="post-item"></div>
                <div class="post-item"></div>
                <div class="post-item"></div>
                <div class="post-item"></div>
                <div class="post-item"></div>
                <div class="post-item"></div>
                <div class="post-item"></div>
                </div>
            </div>
        </div>
    </div>
        <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=84d8aeff75217261fb3eb2190840c88e&libraries=services&autoload=false"></script>
        <script src="/js/map.js"></script>
</body>
</html>
